name: Sync Upstream

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday 08:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    name: Rebase NVENC changes onto latest upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nvenc-windows
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/livekit/rust-sdks.git
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream has $BEHIND new commits"

      - name: Rebase onto upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git rebase upstream/main || {
            echo "::error::Rebase failed — manual resolution needed"
            git rebase --abort
            exit 1
          }
          git push origin nvenc-windows --force-with-lease
          echo "Synced ${{ steps.check.outputs.behind }} commits from upstream"
